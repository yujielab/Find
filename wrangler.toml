name = "find"
main = "src/worker.js"
compatibility_date = "2024-11-12"
compatibility_flags = ["nodejs_compat"]

# Static assets — the directory containing index.html is served automatically.
[assets]
directory = "./public"
binding = "ASSETS"

# Durable Object binding for per-room real-time state.
[[durable_objects.bindings]]
name = "ROOMS"
class_name = "LocationRoom"

# DO migration — required when first deploying.
[[migrations]]
tag = "v1"
new_classes = ["LocationRoom"]
